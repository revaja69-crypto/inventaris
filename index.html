<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris Barang Dasar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Inventaris Barang</h1>
        
        <div class="input-section">
            <input type="text" id="namaBarang" placeholder="Nama Barang">
            <input type="number" id="jumlahBarang" placeholder="Jumlah">
            <button id="btnTambah">Tambah</button>
        </div>

        <div class="search-section">
            <input type="text" id="inputCari" placeholder="Cari barang...">
        </div>

        <table id="tabelInventaris">
            <thead>
                <tr>
                    <th>Nama Barang</th>
                    <th>Jumlah</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
